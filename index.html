<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Player</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Full-screen player ── */
    #player {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
    }
    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Back button ── */
    #back-btn {
      display: none;
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 9px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      touch-action: manipulation;
    }

    /* ── Home screen ── */
    #home {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem clamp(1rem, 5vw, 3rem);
      gap: 1.25rem;
      overflow: hidden;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .logo svg { flex-shrink: 0; }

    .search-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 620px;
    }

    input {
      flex: 1;
      min-width: 0;
      padding: 13px 16px;
      border-radius: 12px;
      border: 1.5px solid #2a2a2a;
      background: #111;
      color: #fff;
      font-size: clamp(14px, 3vw, 15px);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: #ff0000; }
    input::placeholder { color: #555; }

    .play-btn {
      flex-shrink: 0;
      padding: 13px 22px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: clamp(14px, 3vw, 15px);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .play-btn:hover { background: #cc0000; }
    .play-btn:active { background: #aa0000; }

    .err {
      font-size: 13px;
      color: #ff6b6b;
      min-height: 18px;
      text-align: center;
    }

    .hint {
      font-size: clamp(11px, 2.5vw, 12px);
      color: #3a3a3a;
      text-align: center;
      max-width: 560px;
      line-height: 1.8;
    }
    .hint code {
      background: #141414;
      padding: 3px 8px;
      border-radius: 5px;
      color: #666;
      font-size: 11px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div id="player"></div>
  <button id="back-btn" onclick="goHome()">← Back</button>

  <div id="home">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#ff0000">
        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.4 12 20.4 12 20.4s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
      </svg>
      Player
    </div>

    <div class="search-row">
      <input id="url-input" type="url" inputmode="url" autocomplete="off" autocorrect="off"
        placeholder="Paste a YouTube link…"
        onkeydown="if(event.key==='Enter'){this.blur();play();}"
        oninput="document.getElementById('err').textContent=''" />
      <button class="play-btn" onclick="play()">▶ Play</button>
    </div>
    <div class="err" id="err"></div>

    <div class="hint">
      Or link directly:<br/>
      <code>yourapp.vercel.app/?url=https://youtu.be/VIDEO_LINK</code>
    </div>
  </div>

  <script>
    function extractId(raw) {
      raw = (raw || '').trim();
      const patterns = [
        /[?&]v=([a-zA-Z0-9_-]{11})/,
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /\/embed\/([a-zA-Z0-9_-]{11})/,
        /\/shorts\/([a-zA-Z0-9_-]{11})/,
        /\/live\/([a-zA-Z0-9_-]{11})/,
      ];
      for (const p of patterns) {
        const m = raw.match(p);
        if (m) return m[1];
      }
      if (/^[a-zA-Z0-9_-]{11}$/.test(raw)) return raw;
      return null;
    }

    function showPlayer(id) {
      const src = 'https://www.youtube-nocookie.com/embed/' + id
        + '?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&fs=1&playsinline=1';
      const p = document.getElementById('player');
      p.innerHTML = '<iframe src="' + src + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>';
      p.style.display = 'block';
      document.getElementById('home').style.display = 'none';
      document.getElementById('back-btn').style.display = 'block';
      history.pushState({}, '', '?v=' + id);
    }

    function goHome() {
      document.getElementById('player').innerHTML = '';
      document.getElementById('player').style.display = 'none';
      document.getElementById('home').style.display = 'flex';
      document.getElementById('back-btn').style.display = 'none';
      history.pushState({}, '', '/');
    }

    function play(raw) {
      const val = raw || document.getElementById('url-input').value.trim();
      if (!val) { document.getElementById('err').textContent = 'Paste a link first.'; return; }
      const id = extractId(val);
      if (!id) { document.getElementById('err').textContent = 'Invalid YouTube link.'; return; }
      showPlayer(id);
    }

    // Parse URL params — handle ?url= even when the YouTube URL contains its own ?si= params
    (function () {
      const search = location.search;
      // Check for ?v=ID first
      const vMatch = search.match(/[?&]v=([a-zA-Z0-9_-]{11})(?:&|$)/);
      if (vMatch) { showPlayer(vMatch[1]); return; }

      // Extract everything after url= (robust against nested ? from ?si= etc.)
      const urlIdx = search.indexOf('url=');
      if (urlIdx !== -1) {
        const rawUrl = decodeURIComponent(search.slice(urlIdx + 4));
        const id = extractId(rawUrl);
        if (id) { showPlayer(id); return; }
      }
    })();

    // Handle browser back/forward
    window.addEventListener('popstate', function () {
      const search = location.search;
      if (!search || search === '?') { goHome(); }
    });
  </script>
</body>
</html>
